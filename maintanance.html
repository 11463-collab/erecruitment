<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Sedang Diperbarui - DCS Recruitment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #ffca28;
            --text: #f8fafc;
            --muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            overflow: hidden;
        }

        /* Background Decor */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent);
            filter: blur(150px);
            opacity: 0.1;
            z-index: 0;
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 40px;
            max-width: 500px;
        }

        .icon-box {
            font-size: 5rem;
            color: var(--accent);
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 800;
        }

        p {
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: var(--accent);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        .badge {
            background: rgba(255, 202, 40, 0.1);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid rgba(255, 202, 40, 0.2);
            display: inline-block;
            margin-bottom: 20px;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .btn-back {
            display: inline-block;
            margin-top: 20px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-back:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    
    <div class="container">
        <div class="icon-box">
            <i class="fa-solid fa-screwdriver-wrench"></i>
        </div>
        
        <div class="badge">SISTEM MAINTENANCE</div>
        
        <h1>Mohon Menunggu</h1>
        <p>
            Kami sedang melakukan pemeliharaan rutin dan peningkatan sistem untuk kenyamanan pendaftaran Anda. Kami akan segera kembali!
        </p>

        <span class="loader"></span>
        
        <br>
        <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Kembali ke Beranda</a>
    </div>
</body>
</html>
