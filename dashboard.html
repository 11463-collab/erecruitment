<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DCS Recruitment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --accent: #ffca28; 
            --text: #f8fafc; --muted: #94a3b8; --glass: rgba(30, 41, 59, 0.7); 
            --danger: #ef4444; --success: #22c55e;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        header { background: var(--glass); backdrop-filter: blur(10px); padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; }
        .user-nav { display: flex; align-items: center; gap: 15px; cursor: pointer; padding: 5px 15px; border-radius: 50px; background: rgba(255,255,255,0.05); }
        .avatar { width: 32px; height: 32px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .card { background: var(--card); border-radius: 20px; border: 1px solid #334155; padding: 25px; margin-bottom: 20px; position: relative; }
        .hero { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-item { background: rgba(15, 23, 42, 0.5); padding: 15px; border-radius: 15px; border: 1px solid #334155; text-align: center; }
        .steps { list-style: none; padding: 0; margin: 20px 0; }
        .step-item { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; opacity: 0.4; }
        .step-item.active { opacity: 1; color: var(--accent); font-weight: bold; }
        .btn-exam { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 12px; font-size: 0.9rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; width: 100%; box-sizing: border-box; }
        .announcement { background: rgba(255, 202, 40, 0.05); border-left: 4px solid var(--accent); padding: 15px; border-radius: 0 15px 15px 0; }
        .btn-logout { background: #ef4444; border: none; color: #fff; cursor: pointer; padding: 8px 15px; border-radius: 8px; font-weight: bold; }
        @media (max-width: 850px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 800; font-size: 1.2rem; color: var(--accent);">DCS <span style="color: white;">Recruitment</span></div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="user-nav">
            <span id="header-nama">...</span>
            <div class="avatar" id="avatar-initial">?</div>
        </div>
        <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-power-off"></i></button>
    </div>
</header>

<div class="container">
    <div class="dashboard-grid">
        <div class="main-content">
            <div class="card hero">
                <h1 id="welcome-user">Halo!</h1>
                <p style="color: var(--muted);">Berikut adalah daftar asesmen yang harus Anda selesaikan.</p>
                <div class="stats-grid">
                    <div class="stat-item"><i class="fa-solid fa-book"></i><br><span>Total Ujian</span><br><b id="total-u">0</b></div>
                    <div class="stat-item"><i class="fa-solid fa-circle-check"></i><br><span>Selesai</span><br><b id="done-u">0</b></div>
                </div>
            </div>

            <div id="exam-list-container">
                </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <h4 style="margin-top:0">Alur Rekrutmen</h4>
                <ul class="steps">
                    <li class="step-item active"><i class="fa-solid fa-circle-check"></i> Registrasi Akun</li>
                    <li class="step-item" id="step-exam"><i class="fa-solid fa-circle-dot"></i> Proses Asesmen</li>
                    <li class="step-item" id="step-final"><i class="fa-solid fa-circle-dot"></i> Hasil Akhir</li>
                </ul>
            </div>

            <div class="card announcement">
                <h4 style="margin:0; color:var(--accent)">Panduan</h4>
                <p style="font-size:0.8rem; line-height:1.5">Gunakan browser terbaru dan pastikan koneksi stabil sebelum memulai ujian.</p>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://bzlewbetssmjrsmfbcmy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; // Isi Key Anda
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function initDashboard() {
        let user = JSON.parse(localStorage.getItem('dcs_current_user'));
        if (!user) { window.location.href = 'index.html'; return; }

        const { data: dbUser } = await _supabase.from('applicants').select('*').eq('email', user.email).single();
        if (dbUser) { localStorage.setItem('dcs_current_user', JSON.stringify(dbUser)); user = dbUser; }

        document.getElementById('header-nama').innerText = user.nama;
        document.getElementById('avatar-initial').innerText = user.nama.charAt(0);
        document.getElementById('welcome-user').innerText = `Halo, ${user.nama.split(' ')[0]}!`;

        const { data: exams } = await _supabase.from('list_ujian').select('*').eq('aktif', true);
        const container = document.getElementById('exam-list-container');
        container.innerHTML = "";
        
        let doneCount = 0;
        exams.forEach(ex => {
            const isDone = user.hasil_ujian && user.hasil_ujian[ex.slug] !== undefined;
            if (isDone) doneCount++;

            container.innerHTML += `
                <div class="card" style="border-left: 5px solid ${isDone ? 'var(--success)' : 'var(--accent)'}">
                    <h3>${ex.nama_ujian}</h3>
                    <p style="color:var(--muted); font-size:0.85rem">${ex.deskripsi}</p>
                    ${isDone ? 
                        `<div style="color:var(--success); font-weight:bold"><i class="fa-solid fa-check"></i> Sudah Selesai</div>` : 
                        `<a href="test/kerjakan/soal.html?type=${ex.slug}" class="btn-exam">Mulai Ujian</a>`}
                </div>`;
        });

        document.getElementById('total-u').innerText = exams.length;
        document.getElementById('done-u').innerText = doneCount;

        if (doneCount > 0) document.getElementById('step-exam').classList.add('active');
        if (user.status === 'Lolos' || user.status === 'Gagal') document.getElementById('step-final').classList.add('active');
    }

    function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    initDashboard();
</script>
</body>
</html>
