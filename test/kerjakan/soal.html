<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian - DCS Recruitment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --accent: #ffca28; 
            --text: #f8fafc; 
            --muted: #94a3b8;
            --danger: #ef4444;
        }
        
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* LAYOUT */
        .main-wrapper { display: grid; grid-template-columns: 1fr 300px; height: 100vh; }
        
        /* CONTENT AREA */
        .exam-area { padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .content-container { width: 100%; max-width: 700px; }

        .header-ujian { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #334155; }
        
        .q-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: fadeIn 0.4s ease; }

        .option-item { 
            background: rgba(255,255,255,0.05); border: 1px solid #334155; padding: 15px; 
            border-radius: 12px; margin-top: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px;
        }
        .option-item:hover { background: rgba(255,202,40,0.1); border-color: var(--accent); }
        .option-item.selected { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }

        .nav-controls { display: flex; justify-content: space-between; margin-top: 25px; gap: 15px; }
        .btn-nav { background: #334155; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; flex: 1; transition: 0.2s; }
        .btn-nav:hover { background: #475569; }
        .btn-finish { background: var(--accent); color: #000; }
        .btn-finish:hover { background: #eab308; }

        /* SIDEBAR */
        .sidebar { background: var(--card); border-left: 1px solid #334155; padding: 25px; display: flex; flex-direction: column; }
        .sidebar-title { font-size: 1rem; font-weight: bold; margin-bottom: 20px; color: var(--muted); }
        .grid-no { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .no-btn { 
            aspect-ratio: 1; border: 1px solid #334155; background: #0f172a; color: white; 
            border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; transition: 0.3s;
        }
        .no-btn.filled { background: #3b82f6; border-color: #3b82f6; }
        .no-btn.current { border: 2px solid var(--accent); color: var(--accent); }

        .violation-counter { margin-top: auto; background: rgba(239, 68, 68, 0.1); padding: 15px; border-radius: 12px; border: 1px solid var(--danger); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 850px) { .main-wrapper { grid-template-columns: 1fr; } .sidebar { display: none; } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="exam-area">
        <div class="content-container">
            <div class="header-ujian">
                <div>
                    <h3 style="margin:0" id="userName">...</h3>
                    <small style="color:var(--muted)" id="displayPosisi">Posisi: -</small>
                </div>
                <div id="timer" style="color: var(--danger); font-weight: 800; font-size: 1.2rem;">00:00</div>
            </div>

            <div id="questionContainer">
                </div>

            <div class="nav-controls">
                <button class="btn-nav" onclick="changeQuestion(currentIdx - 1)" id="btnPrev">Sebelumnya</button>
                <button class="btn-nav" onclick="changeQuestion(currentIdx + 1)" id="btnNext">Selanjutnya</button>
                <button class="btn-nav btn-finish" id="btnSubmit" style="display:none" onclick="finishExam()">Kirim Hasil</button>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-title">Navigasi Soal</div>
        <div class="grid-no" id="numberGrid">
            </div>

        <div class="violation-counter">
            <small style="color: var(--danger); font-weight: bold; display: block; margin-bottom: 5px;">Peringatan Keamanan</small>
            <div style="font-size: 0.8rem;">Pelanggaran: <span id="vCount" style="font-weight: 800;">0</span>/3</div>
            <div style="width: 100%; height: 6px; background: #334155; border-radius: 10px; margin-top: 8px;">
                <div id="vBar" style="width: 0%; height: 100%; background: var(--danger); border-radius: 10px; transition: 0.3s;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://bzlewbetssmjrsmfbcmy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6bGV3YmV0c3NtanJzbWZiY215Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDA2MjgsImV4cCI6MjA5MTkxNjYyOH0.qO2AHNwe9Rlh1DImyJJZLzxXoHPSTRKmQZYwWqz1rjQ"; // Ganti dengan anon key Anda
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let questions = [];
    let userAnswers = {};
    let currentIdx = 0;
    let timerInterval;
    const userData = JSON.parse(localStorage.getItem('dcs_current_user'));

    if (!userData) {
        window.location.href = "https://e-recruitment.benevolentclass.my.id/";
    }

    async function initExam() {
        try {
            const { data: config, error: errCfg } = await _supabase.from('status').select('*').eq('id', 1).single();
            
            if (errCfg || !config) return Swal.fire('Error', 'Gagal memuat konfigurasi sistem.', 'error');

            if (!config.sts) {
                await Swal.fire('Ditutup', 'Rekrutmen saat ini sedang tidak dibuka.', 'warning');
                window.location.href = 'https://e-recruitment.benevolentclass.my.id/dashboard'; return;
            }

            const now = new Date();
            const startTime = new Date(config.waktu_mulai);
            const endTime = new Date(config.waktu_selesai);

            if (now < startTime) {
                await Swal.fire('Belum Dimulai', `Ujian baru dapat diakses pada: ${startTime.toLocaleString('id-ID')}`, 'info');
                window.location.href = 'https://e-recruitment.benevolentclass.my.id/dashboard'; return;
            }
            if (now > endTime) {
                await Swal.fire('Waktu Habis', 'Masa pengerjaan untuk jadwal ini telah berakhir.', 'error');
                window.location.href = 'https://e-recruitment.benevolentclass.my.id/dashboard'; return;
            }

            const { data: qData, error: errQ } = await _supabase.from('exams').select('*').order('created_at', { ascending: true });
            
            if (errQ || qData.length === 0) {
                await Swal.fire('Error', 'Bank soal kosong. Hubungi admin.', 'error');
                window.location.href = 'https://e-recruitment.benevolentclass.my.id/dashboard'; return;
            }

            questions = qData;
            document.getElementById('userName').innerText = userData.nama;
            document.getElementById('displayPosisi').innerText = `Posisi: ${userData.posisi}`;
            
            startTimer(config.durasi_ujian * 60);
            showQuestion(0);
            renderNumberGrid();

        } catch (e) {
            console.error(e);
            Swal.fire('Error', 'Terjadi kesalahan sistem.', 'error');
        }
    }

    // --- 3. LOGIKA TIMER ---
    function startTimer(durationInSeconds) {
        let timeLeft = durationInSeconds;
        const timerDisplay = document.getElementById('timer');

        timerInterval = setInterval(() => {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;

            timerDisplay.innerText = `${minutes < 10 ? '0'+minutes : minutes}:${seconds < 10 ? '0'+seconds : seconds}`;

            if (timeLeft <= 60) {
                timerDisplay.style.color = "#ef4444";
                timerDisplay.classList.add('animate__animated', 'animate__flash', 'animate__infinite');
            }

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                autoSubmit(); 
            }
            timeLeft--;
        }, 1000);
    }

    // --- 4. LOGIKA NAVIGASI & RENDER SOAL ---
    function showQuestion(idx) {
        currentIdx = idx;
        const q = questions[idx];
        const container = document.getElementById('questionContainer');

        container.innerHTML = `
            <div class="q-box animate__animated animate__fadeIn">
                <p style="font-size: 1.1rem; line-height: 1.6;">
                    <b style="color: var(--accent)">Pertanyaan ${idx + 1}:</b><br>
                    ${q.pertanyaan}
                </p>
                <div class="options-list">
                    ${['a', 'b', 'c', 'd'].map(opt => `
                        <div class="option-item ${userAnswers[q.id] === opt.toUpperCase() ? 'selected' : ''}" 
                            onclick="selectAnswer('${q.id}', '${opt.toUpperCase()}')">
                            <span class="opt-label">${opt.toUpperCase()}</span>
                            <span>${q['opsi_' + opt]}</span>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;

        // Update tombol Navigasi
        document.getElementById('btnPrev').style.visibility = idx === 0 ? 'hidden' : 'visible';
        
        const isLast = idx === questions.length - 1;
        document.getElementById('btnNext').style.display = isLast ? 'none' : 'block';
        document.getElementById('btnSubmit').style.display = isLast ? 'block' : 'none';

        renderNumberGrid();
    }

    function selectAnswer(questionId, choice) {
        userAnswers[questionId] = choice;
        showQuestion(currentIdx); // Re-render untuk update class 'selected'
    }

    function changeQuestion(idx) {
        if (idx >= 0 && idx < questions.length) {
            showQuestion(idx);
        }
    }

    function renderNumberGrid() {
        const grid = document.getElementById('numberGrid');
        grid.innerHTML = questions.map((q, i) => `
            <button class="no-btn ${userAnswers[q.id] ? 'filled' : ''} ${i === currentIdx ? 'current' : ''}" 
                    onclick="changeQuestion(${i})">
                ${i + 1}
            </button>
        `).join('');
    }

    // --- 5. FINISH & AUTO-SUBMIT ---
    async function autoSubmit() {
        await Swal.fire({
            title: 'Waktu Habis!',
            text: 'Sistem akan mengirimkan jawaban Anda secara otomatis.',
            icon: 'warning',
            timer: 3000,
            showConfirmButton: false,
            allowOutsideClick: false
        });
        finishExam(true); // Parameter true artinya otomatis
    }

    async function finishExam(isAuto = false) {
        // Jika user klik tombol manual, tanya konfirmasi
        if (!isAuto) {
            const result = await Swal.fire({
                title: 'Kirim Jawaban?',
                text: "Anda tidak dapat mengulang ujian kembali!",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#3b82f6',
                cancelButtonColor: '#334155',
                confirmButtonText: 'Ya, Selesai'
            });
            if (!result.isConfirmed) return;
        }

        // Hentikan timer & tampilkan loading
        clearInterval(timerInterval);
        Swal.fire({ title: 'Mengirim...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        // Hitung Skor
        let correctCount = 0;
        questions.forEach(q => {
            if (userAnswers[q.id] === q.jawaban_benar) {
                correctCount++;
            }
        });

        const finalScore = Math.round((correctCount / questions.length) * 100);

        // Update ke Database
        const { error } = await _supabase.from('applicants')
            .update({ 
                skor_ujian: finalScore,
                status: 'Pending' // atau status lain sesuai keinginan
            })
            .eq('email', userData.email);

        if (!error) {
            localStorage.removeItem('dcs_current_user'); 
            window.location.href = "success.html";
        } else {
            Swal.fire('Gagal', 'Gagal menyimpan hasil: ' + error.message, 'error');
        }
    }

    // --- 6. FITUR KEAMANAN (ANTI-TAB SWITCH) ---
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            // Opsional: Beri peringatan jika user pindah tab
            console.warn("User meninggalkan halaman ujian!");
        }
    });

    // Jalankan Fungsi Utama
    initExam();
</script>
</body>
</html>
