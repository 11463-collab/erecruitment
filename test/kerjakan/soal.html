<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian Kompetensi - DCS Recruitment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --accent: #ffca28; 
            --text: #f8fafc; 
            --muted: #94a3b8;
            --danger: #ef4444;
        }
        
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* LAYOUT */
        .main-wrapper { display: grid; grid-template-columns: 1fr 300px; height: 100vh; }
        
        /* CONTENT AREA */
        .exam-area { padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .content-container { width: 100%; max-width: 700px; }

        .header-ujian { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #334155; }
        
        .q-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: fadeIn 0.4s ease; }

        .option-item { 
            background: rgba(255,255,255,0.05); border: 1px solid #334155; padding: 15px; 
            border-radius: 12px; margin-top: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px;
        }
        .option-item:hover { background: rgba(255,202,40,0.1); border-color: var(--accent); }
        .option-item.selected { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }

        .nav-controls { display: flex; justify-content: space-between; margin-top: 25px; gap: 15px; }
        .btn-nav { background: #334155; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; flex: 1; transition: 0.2s; }
        .btn-nav:hover { background: #475569; }
        .btn-finish { background: var(--accent); color: #000; }
        .btn-finish:hover { background: #eab308; }

        /* SIDEBAR */
        .sidebar { background: var(--card); border-left: 1px solid #334155; padding: 25px; display: flex; flex-direction: column; }
        .sidebar-title { font-size: 1rem; font-weight: bold; margin-bottom: 20px; color: var(--muted); }
        .grid-no { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .no-btn { 
            aspect-ratio: 1; border: 1px solid #334155; background: #0f172a; color: white; 
            border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; transition: 0.3s;
        }
        .no-btn.filled { background: #3b82f6; border-color: #3b82f6; }
        .no-btn.current { border: 2px solid var(--accent); color: var(--accent); }

        .violation-counter { margin-top: auto; background: rgba(239, 68, 68, 0.1); padding: 15px; border-radius: 12px; border: 1px solid var(--danger); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 850px) { .main-wrapper { grid-template-columns: 1fr; } .sidebar { display: none; } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="exam-area">
        <div class="content-container">
            <div class="header-ujian">
                <div>
                    <h3 style="margin:0" id="userName">...</h3>
                    <small style="color:var(--muted)" id="displayPosisi">Posisi: -</small>
                </div>
                <div id="timer" style="color: var(--danger); font-weight: 800; font-size: 1.2rem;">00:00</div>
            </div>

            <div id="questionContainer">
                </div>

            <div class="nav-controls">
                <button class="btn-nav" onclick="changeQuestion(currentIdx - 1)" id="btnPrev">Sebelumnya</button>
                <button class="btn-nav" onclick="changeQuestion(currentIdx + 1)" id="btnNext">Selanjutnya</button>
                <button class="btn-nav btn-finish" id="btnSubmit" style="display:none" onclick="finishExam()">Kirim Hasil</button>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-title">Navigasi Soal</div>
        <div class="grid-no" id="numberGrid">
            </div>

        <div class="violation-counter">
            <small style="color: var(--danger); font-weight: bold; display: block; margin-bottom: 5px;">Peringatan Keamanan</small>
            <div style="font-size: 0.8rem;">Pelanggaran: <span id="vCount" style="font-weight: 800;">0</span>/3</div>
            <div style="width: 100%; height: 6px; background: #334155; border-radius: 10px; margin-top: 8px;">
                <div id="vBar" style="width: 0%; height: 100%; background: var(--danger); border-radius: 10px; transition: 0.3s;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://bzlewbetssmjrsmfbcmy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6bGV3YmV0c3NtanJzbWZiY215Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDA2MjgsImV4cCI6MjA5MTkxNjYyOH0.qO2AHNwe9Rlh1DImyJJZLzxXoHPSTRKmQZYwWqz1rjQ";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let questions = [];
    let userAnswers = {}; // { questionId: 'A' }
    let currentIdx = 0;
    let violations = 0;
    const userData = JSON.parse(localStorage.getItem('dcs_current_user'));

    if (!userData) window.location.href = "/erecru/index.html";

    async function initExam() {
        document.getElementById('userName').innerText = userData.nama;
        document.getElementById('displayPosisi').innerText = `Posisi: ${userData.posisi}`;

        const { data, error } = await _supabase.from('exams').select('*');
        if (error) return Swal.fire('Error', 'Gagal ambil soal', 'error');
        
        questions = data;
        renderNumberGrid();
        showQuestion(0);
    }

    function renderNumberGrid() {
        const grid = document.getElementById('numberGrid');
        grid.innerHTML = '';
        questions.forEach((_, i) => {
            const isFilled = userAnswers[questions[i].id] ? 'filled' : '';
            const isCurrent = i === currentIdx ? 'current' : '';
            grid.innerHTML += `<button class="no-btn ${isFilled} ${isCurrent}" onclick="changeQuestion(${i})">${i + 1}</button>`;
        });
    }

    function showQuestion(idx) {
        currentIdx = idx;
        const q = questions[idx];
        const container = document.getElementById('questionContainer');
        
        container.innerHTML = `
            <div class="q-box">
                <p style="font-size: 1.1rem; line-height: 1.6; margin-bottom: 20px;"><b>Soal ${idx + 1}:</b><br>${q.pertanyaan}</p>
                <div class="option-item ${userAnswers[q.id] === 'A' ? 'selected' : ''}" onclick="selectAnswer('${q.id}', 'A')"><b>A.</b> ${q.opsi_a}</div>
                <div class="option-item ${userAnswers[q.id] === 'B' ? 'selected' : ''}" onclick="selectAnswer('${q.id}', 'B')"><b>B.</b> ${q.opsi_b}</div>
                <div class="option-item ${userAnswers[q.id] === 'C' ? 'selected' : ''}" onclick="selectAnswer('${q.id}', 'C')"><b>C.</b> ${q.opsi_c}</div>
                <div class="option-item ${userAnswers[q.id] === 'D' ? 'selected' : ''}" onclick="selectAnswer('${q.id}', 'D')"><b>D.</b> ${q.opsi_d}</div>
            </div>
        `;

        // Navigasi Button logic
        document.getElementById('btnPrev').style.visibility = idx === 0 ? 'hidden' : 'visible';
        document.getElementById('btnNext').style.display = idx === questions.length - 1 ? 'none' : 'block';
        document.getElementById('btnSubmit').style.display = idx === questions.length - 1 ? 'block' : 'none';
        
        renderNumberGrid();
    }

    function selectAnswer(qId, val) {
        userAnswers[qId] = val;
        showQuestion(currentIdx);
    }

    function changeQuestion(idx) {
        if (idx >= 0 && idx < questions.length) showQuestion(idx);
    }

    // ANTI CHEAT LOGIC
    window.addEventListener('blur', () => {
        violations++;
        updateViolationUI();

        if (violations >= 3) {
            diskualifikasiUser();
        } else {
            Swal.fire({
                title: 'Pelanggaran Terdeteksi!',
                text: `Jangan berpindah tab! Pelanggaran ${violations}/3. Jika mencapai 3, Anda akan didiskualifikasi secara otomatis.`,
                icon: 'error',
                confirmButtonColor: '#3b82f6'
            });
        }
    });

    function updateViolationUI() {
        document.getElementById('vCount').innerText = violations;
        document.getElementById('vBar').style.width = (violations / 3 * 100) + '%';
    }

    async function diskualifikasiUser() {
        // Update skor jadi 0 dan status Gagal
        await _supabase.from('applicants').update({ skor_ujian: 0, status: 'Gagal' }).eq('email', userData.email);
        
        Swal.fire({
            title: 'DISKUALIFIKASI!',
            text: 'Anda melanggar aturan ujian sebanyak 3 kali. Akses ujian ditutup.',
            icon: 'error',
            allowOutsideClick: false,
            confirmButtonText: 'Kembali ke Dashboard'
        }).then(() => {
            window.location.href = "/e-recru/dashboard.html";
        });
    }

    async function finishExam() {
        // 1. Cek apakah ada soal yang belum dijawab
        const totalSoal = questions.length;
        const dijawab = Object.keys(userAnswers).length;

        const confirm = await Swal.fire({
            title: 'Kirim Jawaban?',
            text: dijawab < totalSoal 
                ? `Anda baru menjawab ${dijawab} dari ${totalSoal} soal. Yakin ingin mengirim?` 
                : "Semua soal telah dijawab. Kirim sekarang?",
            icon: dijawab < totalSoal ? 'warning' : 'question',
            showCancelButton: true,
            confirmButtonColor: '#ffca28',
            cancelButtonColor: '#334155',
            confirmButtonText: 'Ya, Kirim!',
            cancelButtonText: 'Cek Lagi'
        });

        if (!confirm.isConfirmed) return;

        // 2. Tampilkan Loading
        Swal.fire({ 
            title: 'Menyimpan Hasil...', 
            text: 'Mohon tunggu sebentar, jangan tutup browser.',
            allowOutsideClick: false,
            didOpen: () => Swal.showLoading() 
        });

        // 3. Hitung Skor
        let correctCount = 0;
        questions.forEach(q => {
            if (userAnswers[q.id] === q.jawaban_benar) {
                correctCount++;
            }
        });

        const finalScore = Math.round((correctCount / totalSoal) * 100);

        // 4. Update ke Database Supabase
        const { error } = await _supabase
            .from('applicants')
            .update({ 
                skor_ujian: finalScore,
                // Kita juga set status ke 'Pending' lagi untuk memastikan 
                // data ter-refresh di dashboard
                status: userData.status 
            })
            .eq('email', userData.email);

        if (!error) {
            // 5. Update Local Storage agar Dashboard langsung berubah warnanya
            userData.skor_ujian = finalScore;
            localStorage.setItem('dcs_current_user', JSON.stringify(userData));

            // 6. Redirect ke halaman Success
            Swal.fire({
                title: 'Berhasil!',
                text: 'Jawaban Anda telah tersimpan di sistem kami.',
                icon: 'success',
                timer: 2000,
                showConfirmButton: false
            }).then(() => {
                window.location.href = "success.html";
            });
        } else {
            console.error(error);
            Swal.fire('Gagal!', 'Terjadi kesalahan saat mengirim: ' + error.message, 'error');
        }
    }

    initExam();
</script>
</body>
</html>
